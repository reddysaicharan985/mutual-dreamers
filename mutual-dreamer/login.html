<!DOCTYPE html>
<html>
<head>
    <title>Login - Mutual Dreamers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <h2>🌙 Mutual Dreamers</h2>
    <div>
        <button onclick="location.href='index.html'">Home</button>
        <button onclick="location.href='register.html'">Register</button>
    </div>
</header>

<div class="login-page">
    <div class="login-box">
        <h2>Welcome Back Dreamer</h2>

        <input type="text" id="loginInput" placeholder="Email or Dreamer ID"><br>
        
        <input type="password" id="password" placeholder="Password"><br>

        <button id="loginBtn">Login</button>

        <br><br>

        <button id="googleLoginBtn" style="background:#db4437; color:white;">
            Continue with Google
        </button>

        <p class="note">
            Don’t have an account?
            <a href="register.html" style="color:#4da6ff;">Create Account</a>
        </p>
    </div>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiPbhvf8g0rugp2ezoDSMkgF81IOHJ_Xg",
  authDomain: "mutual-dreamers.firebaseapp.com",
  projectId: "mutual-dreamers",
  storageBucket: "mutual-dreamers.firebasestorage.app",
  messagingSenderId: "520139245009",
  appId: "1:520139245009:web:a0978c20feb41e99584cf0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", async () => {

    const email = document.getElementById("loginInput").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        alert("Please fill all fields.");
        return;
    }

    try {

        // Keep user logged in on this device
        await setPersistence(auth, browserLocalPersistence);

        // Login
        await signInWithEmailAndPassword(auth, email, password);

        alert("Login Successful!");
        window.location.href = "explore.html";

    } catch (error) {

        alert(error.message);
        console.log(error);

    }

});

</script>

</body>
</html>
